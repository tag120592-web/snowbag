services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: snowbag
      POSTGRES_PASSWORD: snowbag
      POSTGRES_DB: snowbag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./api/migrations/002_files_audit.sql:/docker-entrypoint-initdb.d/002_files_audit.sql:ro
      - ./api/migrations/003_calculation_runs.sql:/docker-entrypoint-initdb.d/003_calculation_runs.sql:ro
      - ./api/migrations/004_project_geo.sql:/docker-entrypoint-initdb.d/004_project_geo.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snowbag -d snowbag"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: snowbag
      MINIO_ROOT_PASSWORD: snowbag123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./infra/minio-cors.json:/tmp/cors.json:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 snowbag snowbag123 &&
      mc mb --ignore-existing local/snowbag-files &&
      mc cors set local/snowbag-files /tmp/cors.json &&
      exit 0
      "

  api:
    build: ./api
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://snowbag:snowbag@postgres:5432/snowbag?sslmode=disable
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: snowbag
      S3_SECRET_KEY: snowbag123
      S3_BUCKET: snowbag-files
      S3_PUBLIC_ENDPOINT: localhost:9000
      CORS_ORIGIN: http://localhost:5173,http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        VITE_YANDEX_MAPS_API_KEY: ${VITE_YANDEX_MAPS_API_KEY:-}
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
