<script type="text/babel">

//==== RoofCanvas.jsx ====
// «Снеговые мешки» — центральный SVG-план кровли с послойным раскрытием.
// Слои управляются пропом layers; послойно используется на шагах 2–7.
const SnowIcon = window.__lazyTN("Icon");

const RISK_META = {
  critical: { fill: "var(--red-60)", soft: "var(--red-10)", line: "var(--red-65)", label: "Критическая", tone: "red" },
  high: { fill: "var(--orange-40)", soft: "var(--orange-10)", line: "var(--orange-50)", label: "Высокая", tone: "orange" },
  medium: { fill: "var(--yellow-30)", soft: "var(--yellow-10)", line: "var(--yellow-40)", label: "Средняя", tone: "yellow" },
};

function ptsStr(pts) { return pts.map((p) => p.join(",")).join(" "); }
function centroid(pts) {
  const n = pts.length;
  return [pts.reduce((a, p) => a + p[0], 0) / n, pts.reduce((a, p) => a + p[1], 0) / n];
}
function shrink(pts, t) {
  const c = centroid(pts);
  return pts.map((p) => [c[0] + (p[0] - c[0]) * (1 - t), c[1] + (p[1] - c[1]) * (1 - t)]);
}

// ---------- Роза ветров ----------
function WindRose({ size = 150, data = window.SNOW_DATA.WINDROSE, north = 0 }) {
  const cx = size / 2, cy = size / 2, R = size / 2 - 18;
  const max = Math.max(...data.map((d) => d.v));
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: "block" }}>
      <g transform={`rotate(${north} ${cx} ${cy})`}>
        {[0.5, 1].map((f, i) => (
          <circle key={i} cx={cx} cy={cy} r={R * f} fill="none" stroke="var(--neutral-20)" strokeWidth="1" strokeDasharray={i === 0 ? "3 3" : "0"} />
        ))}
        {data.map((d) => {
          const rad = (d.deg - 90) * Math.PI / 180;
          const len = (d.v / max) * R;
          const x = cx + Math.cos(rad) * len, y = cy + Math.sin(rad) * len;
          const w = 7;
          const px = cx + Math.cos(rad + Math.PI / 2) * w, py = cy + Math.sin(rad + Math.PI / 2) * w;
          const qx = cx + Math.cos(rad - Math.PI / 2) * w, qy = cy + Math.sin(rad - Math.PI / 2) * w;
          const strong = d.v === max;
          return <polygon key={d.dir} points={`${cx},${cy} ${px},${py} ${x},${y} ${qx},${qy}`}
            fill={strong ? "var(--red-60)" : "var(--blue-40)"} fillOpacity={strong ? 0.9 : 0.55} />;
        })}
      </g>
      {/* стороны света — без поворота, подписи фиксированы к географии */}
      {[["С", 0], ["В", 90], ["Ю", 180], ["З", 270]].map(([lab, deg]) => {
        const rad = (deg - 90 + north) * Math.PI / 180;
        const r = R + 11;
        return <text key={lab} x={cx + Math.cos(rad) * r} y={cy + Math.sin(rad) * r + 4}
          textAnchor="middle" fontSize="11" fontWeight={lab === "С" ? 800 : 600}
          fill={lab === "С" ? "var(--red-60)" : "var(--content-tertiary-enabled)"}>{lab}</text>;
      })}
    </svg>
  );
}

// ---------- План кровли ----------
function RoofCanvas({ layers = {}, selectedId = null, onSelect, view3d = false, height = "100%" }) {
  const D = window.SNOW_DATA;
  const L = { geometry: true, parapet: true, walkway: false, obstacles: false, bags: false, sensors: false, dims: false, north: false, wind: false, ...layers };
  const sel = (id) => onSelect && onSelect(id);

  return (
    <div style={{ width: "100%", height, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden", perspective: view3d ? "1500px" : "none" }}>
      <svg viewBox="0 0 1000 680" width="100%" height="100%" preserveAspectRatio="xMidYMid meet"
        style={{
          maxHeight: "100%", transition: "transform .45s ease",
          transform: view3d ? "rotateX(56deg) rotateZ(-20deg) scale(.92)" : "none",
          transformOrigin: "center 62%",
          filter: view3d ? "drop-shadow(0 40px 30px rgba(20,24,38,.22))" : "none",
        }}>
        <defs>
          <pattern id="snowGrid" width="34" height="34" patternUnits="userSpaceOnUse">
            <path d="M34 0H0V34" fill="none" stroke="var(--neutral-15)" strokeWidth="1" />
          </pattern>
        </defs>

        {/* фон-сетка */}
        <rect x="0" y="0" width="1000" height="680" fill="var(--neutral-10)" />

        {/* ---------- Контур кровли ---------- */}
        {L.geometry && (
          <g>
            <polygon points={ptsStr(D.ROOF)} fill="#ffffff" />
            <polygon points={ptsStr(D.ROOF)} fill="url(#snowGrid)" />
            <polygon points={ptsStr(D.ROOF)} fill="none" stroke="var(--content-primary-a-enabled)" strokeWidth="2.5" strokeLinejoin="round" />
            {L.parapet && (
              <polygon points={ptsStr(D.ROOF)} fill="none" stroke="var(--neutral-45)" strokeWidth="7" strokeOpacity="0.35" strokeLinejoin="round" />
            )}
          </g>
        )}

        {/* ---------- Снеговые мешки (тепловая карта) ---------- */}
        {L.bags && D.SNOWBAGS.map((z) => {
          const m = RISK_META[z.risk];
          const on = selectedId === z.id;
          return (
            <g key={z.id} style={{ cursor: onSelect ? "pointer" : "default" }} onClick={() => sel(z.id)}>
              <polygon points={ptsStr(z.poly)} fill={m.fill} fillOpacity="0.16" />
              <polygon points={ptsStr(shrink(z.poly, 0.32))} fill={m.fill} fillOpacity="0.26" />
              <polygon points={ptsStr(shrink(z.poly, 0.62))} fill={m.fill} fillOpacity="0.4" />
              <polygon points={ptsStr(z.poly)} fill="none" stroke={m.line}
                strokeWidth={on ? 3 : 1.5} strokeDasharray="5 4" />
              {!view3d && (
                <text x={centroid(z.poly)[0]} y={centroid(z.poly)[1] + 4} textAnchor="middle"
                  fontSize="13" fontWeight="800" fill={m.line}>{z.id}</text>
              )}
            </g>
          );
        })}

        {/* ---------- Пешеходная дорожка ---------- */}
        {L.walkway && (
          <polyline points={ptsStr(D.WALKWAY)} fill="none" stroke="var(--blue-40)"
            strokeWidth="6" strokeDasharray="2 8" strokeLinecap="round" strokeOpacity="0.7" />
        )}

        {/* ---------- Препятствия ---------- */}
        {L.obstacles && D.OBSTACLES.map((o) => {
          const on = selectedId === o.id;
          if (o.shape === "circle") {
            return (
              <g key={o.id} style={{ cursor: onSelect ? "pointer" : "default" }} onClick={() => sel(o.id)}>
                <circle cx={o.cx} cy={o.cy} r={o.r} fill="#fff" stroke="var(--blue-55)" strokeWidth={on ? 3 : 2} />
                <circle cx={o.cx} cy={o.cy} r={o.r - 4} fill="var(--blue-40)" fillOpacity="0.5" />
              </g>
            );
          }
          return (
            <g key={o.id} style={{ cursor: onSelect ? "pointer" : "default" }} onClick={() => sel(o.id)}>
              <rect x={o.x} y={o.y} width={o.w} height={o.h} rx="3"
                fill={on ? "var(--neutral-20)" : "var(--neutral-15)"}
                stroke={on ? "var(--content-primary-a-enabled)" : "var(--neutral-45)"} strokeWidth={on ? 2.5 : 1.5} />
              <line x1={o.x} y1={o.y} x2={o.x + o.w} y2={o.y + o.h} stroke="var(--neutral-35)" strokeWidth="1" />
              <line x1={o.x + o.w} y1={o.y} x2={o.x} y2={o.y + o.h} stroke="var(--neutral-35)" strokeWidth="1" />
              {!view3d && (
                <text x={o.x + o.w / 2} y={o.y + o.h / 2 + 4} textAnchor="middle" fontSize="11"
                  fontWeight="600" fill="var(--content-secondary-enabled)">{o.short}</text>
              )}
            </g>
          );
        })}

        {/* ---------- Датчики ---------- */}
        {L.sensors && D.SENSORS.map((s) => {
          const on = selectedId === s.id;
          return (
            <g key={s.id} style={{ cursor: onSelect ? "pointer" : "default" }} onClick={() => sel(s.id)}>
              {on && <circle cx={s.x} cy={s.y} r="16" fill="var(--red-60)" fillOpacity="0.15" />}
              <circle cx={s.x} cy={s.y} r="9" fill="var(--red-60)" stroke="#fff" strokeWidth="2.5" />
              <circle cx={s.x} cy={s.y} r="3" fill="#fff" />
            </g>
          );
        })}

        {/* ---------- Размеры ---------- */}
        {L.dims && (
          <g fontSize="12" fontWeight="600" fill="var(--content-tertiary-enabled)">
            <DimLine x1={90} y1={64} x2={910} y2={64} label="124,0 м" />
            <DimLine x1={64} y1={90} x2={64} y2={590} label="76,0 м" vertical />
            <DimLine x1={560} y1={616} x2={910} y2={616} label="53,0 м" flip />
          </g>
        )}

        {/* ---------- Компас + роза ветров на схеме ---------- */}
        {L.north && (
          <g transform="translate(842, 556)">
            <foreignObject x="-40" y="-40" width="120" height="120">
              <div xmlns="http://www.w3.org/1999/xhtml" style={{ width: 120, height: 120 }}>
                <WindRose size={120} north={D.CLIMATE.northDeg} />
              </div>
            </foreignObject>
          </g>
        )}
      </svg>
    </div>
  );
}

function DimLine({ x1, y1, x2, y2, label, vertical, flip }) {
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  return (
    <g stroke="var(--neutral-45)" strokeWidth="1">
      <line x1={x1} y1={y1} x2={x2} y2={y2} />
      <line x1={x1} y1={vertical ? y1 : y1 - 5} x2={x1} y2={vertical ? y1 : y1 + 5} />
      <line x1={x2} y1={vertical ? y2 : y2 - 5} x2={x2} y2={vertical ? y2 : y2 + 5} />
      {vertical
        ? <text x={x1 - 6} y={my} textAnchor="middle" stroke="none" transform={`rotate(-90 ${x1 - 6} ${my})`}>{label}</text>
        : <text x={mx} y={flip ? y1 + 16 : y1 - 6} textAnchor="middle" stroke="none">{label}</text>}
    </g>
  );
}

const SA = window.__lazyNS();

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + " Б";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1).replace(".", ",") + " КБ";
  return (bytes / (1024 * 1024)).toFixed(1).replace(".", ",") + " МБ";
}

// ============ Шаг 1 — Загрузка данных ============
function StepUpload({
  isNew = false,
  files = [],
  scale = null,
  mapAddress = "",
  mapSelected = false,
  onFileAdd,
  onMapSelect,
}) {
  const [tab, setTab] = React.useState("file");
  const [zoom, setZoom] = React.useState(100);
  const [rot, setRot] = React.useState(0);
  const [address, setAddress] = React.useState(mapAddress);
  const fileRef = React.useRef(null);

  React.useEffect(() => { setAddress(mapAddress); }, [mapAddress]);

  const hasFile = files.length > 0;
  const showFilePreview = !isNew || hasFile;
  const showMap = !isNew || mapSelected;

  function handleFileInput(e) {
    const file = e.target.files?.[0];
    if (!file || !onFileAdd) return;
    onFileAdd({
      name: file.name,
      size: formatFileSize(file.size),
      desc: /\.(dwg|dxf)$/i.test(file.name) ? "узел / чертёж" : "план кровли",
      selected: true,
    });
    e.target.value = "";
  }

  function handleMapSearch() {
    const q = address.trim();
    if (!q || !onMapSelect) return;
    onMapSelect(q);
  }

  return (
    <div style={{ flex: 1, display: "flex", minHeight: 0 }}>
      <div style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column", background: "var(--neutral-10)" }}>
        <SA.Tabs variant="segmented" value={tab}
          options={[{ id: "file", name: "Файл чертежа", icon: "file-text" }, { id: "map", name: "Адрес на карте", icon: "map-pin" }]}
          onChange={setTab} />
        {tab === "file" ? (
          <>
            {showFilePreview && (
              <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "12px 20px", background: "#fff", borderBottom: "1px solid var(--border-secondary-enabled)", margin: "0 20px", borderRadius: "0 0 var(--radius-lg) var(--radius-lg)" }}>
                <ViewBtn icon="minus" onClick={() => setZoom((z) => Math.max(40, z - 20))} />
                <span style={{ fontSize: 13, fontWeight: 600, width: 48, textAlign: "center", color: "var(--content-secondary-enabled)" }}>{zoom}%</span>
                <ViewBtn icon="plus" onClick={() => setZoom((z) => Math.min(200, z + 20))} />
                <div style={{ width: 1, height: 22, background: "var(--border-secondary-enabled)", margin: "0 6px" }} />
                <ViewBtn icon="rotate-cw" onClick={() => setRot((r) => r + 90)} />
                <div style={{ flex: 1 }} />
                <SA.Button variant="white" icon="ruler" size="sm">Привязать масштаб{scale ? ` · ${scale}` : ""}</SA.Button>
              </div>
            )}
            <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: 24, overflow: "hidden" }}>
              {showFilePreview ? (
                <div style={{ background: "#fff", border: "1px solid var(--border-secondary-enabled)", boxShadow: "var(--shadow-small)", borderRadius: 4, padding: 18, transform: `scale(${zoom / 100}) rotate(${rot}deg)`, transition: "transform .25s" }}>
                  <div style={{ width: 560, height: 380, filter: "grayscale(1) opacity(.7)" }}>
                    <window.RoofCanvas layers={{ geometry: true, parapet: true, obstacles: true }} height="380px" />
                  </div>
                  <div style={{ marginTop: 10, fontFamily: "var(--font-family-mono, monospace)", fontSize: 11, color: "var(--content-tertiary-enabled)", textAlign: "center" }}>
                    {(files.find((f) => f.selected) || files[0])?.name || "Кровля_Север-2.pdf"} · лист 1 · план кровли
                  </div>
                </div>
              ) : (
                <div style={{ textAlign: "center", maxWidth: 320 }}>
                  <div style={{ width: 64, height: 64, margin: "0 auto 16px", borderRadius: 999, background: "var(--neutral-15)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <SA.Icon name="file-text" size={28} color="var(--neutral-40)" />
                  </div>
                  <div style={{ fontSize: 15, fontWeight: 600, color: "var(--content-secondary-enabled)", marginBottom: 6 }}>Чертёж не загружен</div>
                  <div style={{ fontSize: 13, color: "var(--content-tertiary-enabled)", lineHeight: 1.5 }}>Загрузите файл в панели справа — план кровли появится здесь</div>
                </div>
              )}
            </div>
          </>
        ) : (
          <div style={{ flex: 1, position: "relative", display: "flex", alignItems: "center", justifyContent: "center", margin: 20, borderRadius: "var(--radius-lg)", overflow: "hidden", border: "1px solid var(--border-secondary-enabled)", background: "repeating-linear-gradient(45deg, #eef0f4, #eef0f4 12px, #e7e9ef 12px, #e7e9ef 24px)" }}>
            {showMap && <div style={{ position: "absolute", inset: 0, background: "radial-gradient(circle at 60% 45%, rgba(225,27,17,.10), transparent 40%)" }} />}
            {showMap && <SA.Icon name="map-pin" size={40} color="var(--red-60)" style={{ position: "absolute", top: "42%", left: "60%" }} />}
            <div style={{ position: "absolute", top: 16, left: 16, right: 16, display: "flex", gap: 8 }}>
              <div style={{ flex: 1 }}>
                <SA.Input icon="search" placeholder="Введите адрес объекта" value={address}
                  onChange={(e) => setAddress(e.target.value)}
                  onKeyDown={(e) => e.key === "Enter" && handleMapSearch()} />
              </div>
              <SA.Button variant="accent" icon="map-pin" size="lg" onClick={handleMapSearch}>Указать на карте</SA.Button>
            </div>
            <div style={{ fontFamily: "monospace", fontSize: 12, color: "var(--neutral-55)" }}>
              {showMap ? "Яндекс.Карты · спутниковый снимок" : "Введите адрес и нажмите «Указать на карте»"}
            </div>
          </div>
        )}
      </div>

      <div style={{ width: 380, flex: "0 0 380px", borderLeft: "1px solid var(--border-secondary-enabled)", background: "#fff", display: "flex", flexDirection: "column", overflowY: "auto" }}>
        {tab === "file" ? (
          <>
            <window.PanelHead title="Источник данных" />
            <div style={{ padding: "0 20px 16px" }}>
              <div role="button" tabIndex={0} onClick={() => fileRef.current?.click()}
                onKeyDown={(e) => e.key === "Enter" && fileRef.current?.click()}
                style={{ border: "1.5px dashed var(--border-secondary-enabled)", borderRadius: "var(--radius-lg)", padding: "22px 18px", textAlign: "center", background: "var(--neutral-10)", cursor: "pointer" }}>
                <input ref={fileRef} type="file" accept=".pdf,.dwg,.dxf,.jpg,.jpeg,.png" hidden onChange={handleFileInput} />
                <div style={{ width: 46, height: 46, margin: "0 auto 10px", borderRadius: 999, background: "var(--red-10)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <SA.Icon name="upload" size={22} color="var(--red-60)" />
                </div>
                <div style={{ fontSize: 14, fontWeight: 600, color: "var(--content-primary-a-enabled)" }}>Перетащите файл сюда</div>
                <div style={{ fontSize: 12.5, color: "var(--content-tertiary-enabled)", margin: "4px 0 12px" }}>PDF, DWG, DXF, JPG, PNG · до 100 МБ</div>
                <SA.Button variant="white" size="sm" icon="folder-open" onClick={(e) => { e.stopPropagation(); fileRef.current?.click(); }}>Выбрать файл</SA.Button>
              </div>
            </div>
            {hasFile && (
              <>
                <window.PanelHead title="Загруженные файлы" count={files.length} />
                <div style={{ padding: "0 12px" }}>
                  {files.map((f, i) => (
                    <SA.Cell key={i} leftIcon="file-text" title={f.name} subtitle={`${f.size} · ${f.desc}`}
                      rightIcon={f.selected ? "check" : "ellipsis-vertical"} selected={f.selected} />
                  ))}
                </div>
              </>
            )}
            {scale && (
              <div style={{ margin: "12px 20px", padding: "14px 16px", background: "var(--blue-10)", borderRadius: "var(--radius-md)", display: "flex", gap: 10 }}>
                <SA.Icon name="info" size={18} color="var(--blue-60)" />
                <span style={{ fontSize: 12.5, color: "var(--blue-65)", lineHeight: 1.45 }}>Масштаб распознан по штампу чертежа: <b>{scale}</b>. При необходимости задайте вручную по известному размеру.</span>
              </div>
            )}
          </>
        ) : (
          <>
            <window.PanelHead title="Адрес объекта" />
            <div style={{ padding: "0 20px 16px", display: "flex", flexDirection: "column", gap: 12 }}>
              <div>
                <div style={{ fontSize: 12.5, fontWeight: 600, color: "var(--content-secondary-enabled)", marginBottom: 6 }}>Адрес на карте</div>
                <SA.Input icon="map-pin" placeholder="г. Екатеринбург, ул. Примерная, 1" value={address}
                  onChange={(e) => setAddress(e.target.value)}
                  onKeyDown={(e) => e.key === "Enter" && handleMapSearch()} />
              </div>
              <SA.Button variant="accent" icon="search" size="md" block onClick={handleMapSearch}>Найти на Яндекс.Картах</SA.Button>
              {mapSelected ? (
                <div style={{ padding: "12px 14px", background: "var(--green-10)", borderRadius: "var(--radius-md)", display: "flex", gap: 10 }}>
                  <SA.Icon name="circle-check" size={18} color="var(--green-55)" />
                  <span style={{ fontSize: 12.5, color: "var(--green-65)", lineHeight: 1.45 }}>Объект найден. Спутниковый снимок загружен — проверьте контур здания на карте.</span>
                </div>
              ) : (
                <p style={{ margin: 0, fontSize: 12.5, color: "var(--content-tertiary-enabled)", lineHeight: 1.45 }}>Укажите адрес объекта — карта отобразит спутниковый снимок кровли для дальнейшей обводки контура.</p>
              )}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function ViewBtn({ icon, onClick }) {
  const [h, setH] = React.useState(false);
  return (
    <button type="button" onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{ width: 32, height: 32, display: "flex", alignItems: "center", justifyContent: "center", border: "1px solid var(--border-secondary-enabled)", borderRadius: 8, cursor: "pointer", background: h ? "var(--neutral-10)" : "#fff" }}>
      <SA.Icon name={icon} size={16} color="var(--content-secondary-enabled)" />
    </button>
  );
}

// ============ Шаг 2 — Геометрия кровли ============
function StepGeometry() {
  const items = [
    { icon: "spline", name: "Внешний контур кровли", val: "L-образный, 6 вершин", conf: 98 },
    { icon: "frame", name: "Парапет по периметру", val: "Высота 600 мм", conf: 95 },
    { icon: "layout-dashboard", name: "Внутренние зоны / уклоны", val: "4 ската к воронкам", conf: 90 },
    { icon: "move-diagonal", name: "Габариты в плане", val: "124,0 × 76,0 м", conf: 96 },
  ];
  return (
    <window.WorkArea
      canvas={<window.RoofCanvas layers={{ geometry: true, parapet: true, dims: true }} />}
      panel={
        <div style={{ display: "flex", flexDirection: "column", minHeight: 0, height: "100%" }}>
          <window.PanelHead title="Распознанная геометрия" action={<SA.Tag tone="green" size="sm" icon="sparkles">авто · 92%</SA.Tag>} />
          <div style={{ margin: "0 20px 14px", padding: "12px 14px", background: "var(--green-10)", borderRadius: "var(--radius-md)", display: "flex", gap: 10 }}>
            <SA.Icon name="circle-check" size={18} color="var(--green-55)" />
            <span style={{ fontSize: 12.5, color: "var(--green-65)", lineHeight: 1.45 }}>Контур кровли распознан автоматически. Проверьте элементы и подтвердите либо скорректируйте вручную.</span>
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: "0 12px" }}>
            {items.map((it, i) => (
              <SA.Cell key={i} leftIcon={it.icon} title={it.name} subtitle={it.val}
                rightSlot={<span style={{ fontSize: 12.5, fontWeight: 700, color: it.conf >= 95 ? "var(--green-55)" : "var(--orange-50)" }}>{it.conf}%</span>} />
            ))}
          </div>
          <div style={{ padding: 16, borderTop: "1px solid var(--border-secondary-enabled)", display: "flex", gap: 10 }}>
            <SA.Button variant="white" icon="pen-line" size="md" block>Корректировать</SA.Button>
            <SA.Button variant="secondary" icon="check" size="md" block>Принять контур</SA.Button>
          </div>
        </div>
      }
    />
  );
}

// ============ Шаг 3 — Препятствия ============
function StepObstacles() {
  const D = window.SNOW_DATA;
  const [sel, setSel] = React.useState("shaft-1");
  const list = D.OBSTACLES;
  const selObj = list.find((o) => o.id === sel);
  return (
    <window.WorkArea
      canvas={<window.RoofCanvas layers={{ geometry: true, parapet: true, obstacles: true, walkway: true }} selectedId={sel} onSelect={setSel} />}
      panel={
        <div style={{ display: "flex", flexDirection: "column", minHeight: 0, height: "100%" }}>
          <window.PanelHead title="Препятствия" count={list.length} action={<SA.Button variant="white" size="sm" icon="plus">Добавить</SA.Button>} />
          <div style={{ flex: 1, overflowY: "auto", padding: "0 12px" }}>
            {list.map((o) => (
              <SA.Cell key={o.id} selected={o.id === sel} onClick={() => setSel(o.id)}
                leftIcon={o.shape === "circle" ? "circle-dot" : "box"}
                title={o.type}
                subtitle={o.shape === "circle" ? "Точечный объект" : `${o.size} · h ${o.hM} м`}
                rightIcon="chevron-right" />
            ))}
          </div>
          {selObj && selObj.shape !== "circle" && (
            <div style={{ padding: 18, borderTop: "1px solid var(--border-secondary-enabled)", background: "var(--neutral-10)" }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "var(--content-primary-a-enabled)", marginBottom: 10 }}>{selObj.type}</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 16px", fontSize: 13 }}>
                <Prop k="Тип" v={selObj.short} />
                <Prop k="Высота" v={`${selObj.hM} м`} />
                <Prop k="Габариты" v={selObj.size} />
                <Prop k="Координаты" v={`X ${Math.round(selObj.x / 6.6)}, Y ${Math.round(selObj.y / 6.6)} м`} />
              </div>
            </div>
          )}
        </div>
      }
    />
  );
}

function Prop({ k, v }) {
  return (
    <div>
      <div style={{ fontSize: 11.5, color: "var(--content-tertiary-enabled)" }}>{k}</div>
      <div style={{ fontSize: 13.5, fontWeight: 600, color: "var(--content-primary-a-enabled)" }}>{v}</div>
    </div>
  );
}

Object.assign(window, { StepUpload, StepGeometry, StepObstacles });

//==== StepsB.jsx ====
// «Снеговые мешки» — шаги 4–6: Ориентация и климат, Снеговые мешки, Датчики.
const SB = window.__lazyNS();

function FieldRow({ label, children }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 12.5, fontWeight: 600, color: "var(--content-secondary-enabled)", marginBottom: 6 }}>{label}</div>
      {children}
    </div>
  );
}

// ============ Шаг 4 — Ориентация и климат ============
function StepClimate() {
  const C = window.SNOW_DATA.CLIMATE;
  return (
    <window.WorkArea panelWidth={400}
      canvas={<window.RoofCanvas layers={{ geometry: true, parapet: true, obstacles: true, north: true }} />}
      panel={
        <div style={{ display: "flex", flexDirection: "column", minHeight: 0, height: "100%", overflowY: "auto" }}>
          <window.PanelHead title="Привязка к местности" action={<SB.Tag tone="green" size="sm" icon="map-pin">по адресу</SB.Tag>} />
          <div style={{ padding: "0 20px 6px" }}>
            <FieldRow label="Город (определён по адресу)">
              <SB.Input icon="building-2" defaultValue="Екатеринбург" />
            </FieldRow>
            <div style={{ display: "flex", gap: 12 }}>
              <div style={{ flex: 1 }}>
                <FieldRow label="Снеговой район (СП 20.13330)">
                  <SB.Select value="3" options={[
                    { id: "2", title: "II · 1,2 кПа" }, { id: "3", title: "III · 1,8 кПа" },
                    { id: "4", title: "IV · 2,4 кПа" }, { id: "5", title: "V · 3,0 кПа" },
                  ]} />
                </FieldRow>
              </div>
              <div style={{ flex: 1 }}>
                <FieldRow label="Ветровой район">
                  <SB.Select value="2" options={[
                    { id: "1", title: "I · 0,23 кПа" }, { id: "2", title: "II · 0,30 кПа" },
                    { id: "3", title: "III · 0,38 кПа" },
                  ]} />
                </FieldRow>
              </div>
            </div>
          </div>

          {/* Климат-сводка */}
          <div style={{ margin: "4px 20px 16px", padding: "14px 16px", background: "var(--neutral-10)", borderRadius: "var(--radius-lg)", display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px 16px" }}>
            <Metric k="Вес снег. покрова, Sg" v={`${C.sg} кПа`} sub={`${C.sgKg} кг/м²`} />
            <Metric k="Ветровое давление, w₀" v={`${C.w0} кПа`} sub="тип местности B" />
          </div>

          <window.PanelHead title="Ориентация и роза ветров" />
          <div style={{ display: "flex", gap: 14, padding: "0 20px 20px", alignItems: "center" }}>
            <div style={{ flex: "0 0 auto", display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
              <window.NorthArrow size={84} deg={C.northDeg} />
              <span style={{ fontSize: 12, fontWeight: 600, color: "var(--content-secondary-enabled)" }}>Север {C.northDeg}°</span>
            </div>
            <div style={{ flex: 1, background: "#fff", border: "1px solid var(--border-secondary-enabled)", borderRadius: "var(--radius-lg)", padding: 12, display: "flex", flexDirection: "column", alignItems: "center" }}>
              <window.WindRose size={150} north={C.northDeg} />
              <span style={{ fontSize: 12, color: "var(--content-tertiary-enabled)", marginTop: 4 }}>Преобладающий ветер — <b style={{ color: "var(--red-60)" }}>З, ЮЗ</b></span>
            </div>
          </div>
          <div style={{ margin: "0 20px 20px", padding: "12px 16px", background: "var(--blue-10)", borderRadius: "var(--radius-md)", display: "flex", gap: 10 }}>
            <SB.Icon name="wind" size={18} color="var(--blue-60)" />
            <span style={{ fontSize: 12.5, color: "var(--blue-65)", lineHeight: 1.45 }}>Снеговые мешки формируются преимущественно с подветренной (восточной) стороны препятствий и парапетов.</span>
          </div>
        </div>
      }
    />
  );
}

function Metric({ k, v, sub }) {
  return (
    <div>
      <div style={{ fontSize: 11.5, color: "var(--content-tertiary-enabled)" }}>{k}</div>
      <div style={{ fontSize: 18, fontWeight: 800, color: "var(--content-primary-a-enabled)", lineHeight: 1.2 }}>{v}</div>
      {sub && <div style={{ fontSize: 11.5, color: "var(--content-tertiary-enabled)" }}>{sub}</div>}
    </div>
  );
}

// ============ Шаг 5 — Снеговые мешки ============
function StepSnowbags() {
  const D = window.SNOW_DATA;
  const [sel, setSel] = React.useState(null);
  const bags = D.SNOWBAGS;
  return (
    <window.WorkArea panelWidth={400}
      canvas={
        <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
          <window.RoofCanvas layers={{ geometry: true, parapet: true, obstacles: true, bags: true, north: true }} selectedId={sel} onSelect={setSel} />
          <Legend />
        </div>
      }
      panel={
        <div style={{ display: "flex", flexDirection: "column", minHeight: 0, height: "100%" }}>
          <window.PanelHead title="Зоны снегонакопления" count={bags.length} action={<SB.Tag tone="green" size="sm" icon="sparkles">СП 20.13330</SB.Tag>} />
          <div style={{ display: "flex", gap: 8, padding: "0 20px 12px" }}>
            <Chip tone="red" n={D.METRICS.risk.critical} t="критич." />
            <Chip tone="orange" n={D.METRICS.risk.high} t="высоких" />
            <Chip tone="yellow" n={D.METRICS.risk.medium} t="средних" />
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: "0 16px 16px", display: "flex", flexDirection: "column", gap: 10 }}>
            {bags.map((z) => <BagCard key={z.id} z={z} on={sel === z.id} onClick={() => setSel(sel === z.id ? null : z.id)} />)}
          </div>
        </div>
      }
    />
  );
}

function BagCard({ z, on, onClick }) {
  const m = window.RISK_META[z.risk];
  return (
    <button type="button" onClick={onClick} style={{ textAlign: "left", border: `1px solid ${on ? m.line : "var(--border-secondary-enabled)"}`, borderLeft: `4px solid ${m.fill}`, borderRadius: "var(--radius-md)", background: on ? m.soft : "#fff", padding: "12px 14px", cursor: "pointer", transition: "all .12s" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
        <span style={{ fontSize: 13, fontWeight: 800, color: m.line }}>{z.id}</span>
        <span style={{ fontSize: 14, fontWeight: 600, color: "var(--content-primary-a-enabled)" }}>{z.name}</span>
        <div style={{ flex: 1 }} />
        <SB.Tag tone={m.tone} size="sm">{m.label}</SB.Tag>
      </div>
      <div style={{ display: "flex", gap: 18, marginBottom: 6 }}>
        <Mini k="Коэф. μ" v={z.mu.toLocaleString("ru")} />
        <Mini k="Нагрузка S" v={`${z.load} кПа`} />
        <Mini k="Площадь" v={`${z.area} м²`} />
      </div>
      <div style={{ fontSize: 12, color: "var(--content-tertiary-enabled)", display: "flex", alignItems: "center", gap: 6 }}>
        <SB.Icon name="info" size={13} color="var(--content-tertiary-enabled)" />Основание: {z.basis}
      </div>
    </button>
  );
}

function Mini({ k, v }) {
  return (
    <div>
      <div style={{ fontSize: 11, color: "var(--content-tertiary-enabled)" }}>{k}</div>
      <div style={{ fontSize: 14, fontWeight: 700, color: "var(--content-primary-a-enabled)" }}>{v}</div>
    </div>
  );
}

// «Снеговые мешки» — корневая оркестрация: дашборд → мастер из 7 шагов → результат.
const AppIcon = window.__lazyTN("Icon");

const CALC_STEPS = [
  "Анализ геометрии кровли и препятствий",
  "Расчёт коэффициентов μ по СП 20.13330.2016",
  "Построение зон снегонакопления",
  "Подбор расстановки датчиков",
];

function Calculating({ onDone }) {
  const [step, setStep] = React.useState(0);
  const [pct, setPct] = React.useState(5);
  React.useEffect(() => {
    const t1 = setInterval(() => setPct((p) => Math.min(100, p + 4)), 90);
    const t2 = setInterval(() => setStep((s) => Math.min(CALC_STEPS.length - 1, s + 1)), 760);
    const done = setTimeout(onDone, 3100);
    return () => { clearInterval(t1); clearInterval(t2); clearTimeout(done); };
  }, []);
  return (
    <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", background: "var(--neutral-10)" }}>
      <div style={{ width: 480, background: "#fff", border: "1px solid var(--border-secondary-enabled)", borderRadius: "var(--radius-xl)", boxShadow: "var(--shadow-large)", padding: 28 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 13, marginBottom: 18 }}>
          <div style={{ width: 46, height: 46, display: "flex", alignItems: "center", justifyContent: "center", background: "var(--red-10)", borderRadius: "var(--radius-md)" }}>
            <AppIcon name="snowflake" size={24} color="var(--content-accent-enabled)" />
          </div>
          <div>
            <div style={{ fontSize: 17, fontWeight: 700, color: "var(--content-primary-a-enabled)" }}>Идёт расчёт снеговых мешков</div>
            <div style={{ fontSize: 13, color: "var(--content-tertiary-enabled)" }}>Объект «Север-2» · 8 240 м²</div>
          </div>
        </div>
        <div style={{ height: 6, background: "var(--background-tertiary-enabled)", borderRadius: 999, overflow: "hidden" }}>
          <div style={{ width: `${pct}%`, height: "100%", background: "var(--background-accent-enabled)", borderRadius: 999, transition: "width .2s linear" }} />
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 11, marginTop: 20 }}>
          {CALC_STEPS.map((s, i) => {
            const done = i < step, cur = i === step;
            return (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 11 }}>
                <span style={{ width: 22, height: 22, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 999, background: done ? "var(--green-10)" : cur ? "var(--red-10)" : "var(--background-secondary-a-enabled)" }}>
                  {done ? <AppIcon name="check" size={14} color="var(--content-system-positive)" />
                    : cur ? <AppIcon name="loader-circle" size={14} color="var(--content-accent-enabled)" style={{ animation: "tn-spin .7s linear infinite" }} />
                    : <span style={{ width: 6, height: 6, borderRadius: 999, background: "var(--neutral-35)" }} />}
                </span>
                <span style={{ fontSize: 14, color: done || cur ? "var(--content-primary-a-enabled)" : "var(--content-tertiary-enabled)" }}>{s}</span>
              </div>
            );
          })}
        </div>
      </div>
      <style>{`@keyframes tn-spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

const DEMO_UPLOAD = {
  files: [
    { name: "Кровля_Север-2.pdf", size: "2,4 МБ", desc: "план кровли", selected: true },
    { name: "Разрез_парапет.dwg", size: "0,8 МБ", desc: "узел парапета" },
  ],
  scale: "1:200",
  mapAddress: "г. Екатеринбург, Сибирский тракт, 12",
  mapSelected: true,
};

const EMPTY_UPLOAD = { files: [], scale: null, mapAddress: "", mapSelected: false };

function App() {
  const D = window.SNOW_DATA;
  const STEPS = D.STEPS;
  const [route, setRoute] = React.useState("projects"); // projects | wizard
  const [step, setStep] = React.useState(0);
  const [maxReached, setMax] = React.useState(0);
  const [calc, setCalc] = React.useState(false);
  const [showExport, setShowExport] = React.useState(false);
  const [isNewProject, setIsNewProject] = React.useState(false);
  const [upload, setUpload] = React.useState(EMPTY_UPLOAD);

  const goStep = (i) => { setStep(i); setMax((m) => Math.max(m, i)); };
  const openExisting = () => {
    setIsNewProject(false);
    setUpload(DEMO_UPLOAD);
    setRoute("wizard");
    setStep(0);
    setMax(STEPS.length - 1);
  };
  const openNew = () => {
    setIsNewProject(true);
    setUpload(EMPTY_UPLOAD);
    setRoute("wizard");
    setStep(0);
    setMax(0);
  };

  function addFile(file) {
    setUpload((u) => ({
      ...u,
      files: [...u.files.map((f) => ({ ...f, selected: false })), file],
      scale: /\.pdf$/i.test(file.name) ? "1:200" : u.scale,
    }));
  }

  function selectMap(address) {
    setUpload((u) => ({ ...u, mapAddress: address, mapSelected: true }));
  }

  const next = () => {
    const id = STEPS[step].id;
    if (id === "climate") { setCalc(true); return; }      // запуск расчёта мешков
    if (step < STEPS.length - 1) goStep(step + 1);
  };
  const back = () => { if (step > 0) goStep(step - 1); };

  // содержимое шага
  let stepContent = null;
  if (calc) {
    stepContent = <Calculating onDone={() => { setCalc(false); goStep(4); }} />;
  } else {
    const id = STEPS[step].id;
    stepContent = {
      upload: <window.StepUpload isNew={isNewProject} files={upload.files} scale={upload.scale}
        mapAddress={upload.mapAddress} mapSelected={upload.mapSelected}
        onFileAdd={addFile} onMapSelect={selectMap} />,
      geometry: <window.StepGeometry />,
      obstacles: <window.StepObstacles />,
      climate: <window.StepClimate />,
      snowbags: <window.StepSnowbags />,
      sensors: <window.StepSensors />,
      result: <window.ResultView onExport={() => setShowExport(true)} />,
    }[id];
  }

  // конфигурация нижней кнопки
  const footerCfg = (() => {
    const id = STEPS[step].id;
    if (id === "climate") return { nextLabel: "Рассчитать мешки", nextIcon: "sparkles", nextVariant: "accent", hint: "Расчёт по СП 20.13330.2016" };
    if (id === "snowbags") return { nextLabel: "Расставить датчики", nextIcon: "arrow-right" };
    if (id === "sensors") return { nextLabel: "Сформировать схему", nextIcon: "arrow-right", nextVariant: "accent" };
    if (id === "result") return { nextLabel: "Экспорт документов", nextIcon: "download", nextVariant: "accent", onNext: () => setShowExport(true) };
    if (id === "geometry") return { nextLabel: "Подтвердить и далее", nextIcon: "arrow-right" };
    return {};
  })();

  if (route === "projects") {
    return (
      <Frame project={null} onHome={() => setRoute("projects")}>
        <window.ProjectsView onOpen={openExisting} onNew={openNew} />
      </Frame>
    );
  }

  return (
    <Frame project={isNewProject ? null : D.PROJECT} onHome={() => setRoute("projects")}>
      <window.Stepper steps={STEPS} current={step} maxReached={maxReached} onJump={goStep} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0 }}>{stepContent}</div>
      {!calc && (
        <window.WizardFooter current={step} total={STEPS.length} onBack={back}
          onNext={footerCfg.onNext || next} nextLabel={footerCfg.nextLabel} nextIcon={footerCfg.nextIcon}
          nextVariant={footerCfg.nextVariant} hint={footerCfg.hint}
          onDraft={() => setRoute("projects")} />
      )}
      {showExport && <window.ExportDialog onClose={() => setShowExport(false)} />}
    </Frame>
  );
}

function Frame({ project, onHome, children }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", width: "100vw", overflow: "hidden", background: "var(--neutral-10)" }}>
      <window.AppHeader project={project} onHome={onHome} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0 }}>{children}</div>
    </div>
  );
}

class Boundary extends React.Component {
  constructor(p) { super(p); this.state = { err: false }; }
  static getDerivedStateFromError() { return { err: true }; }
  componentDidCatch() {}
  render() { return this.state.err ? null : this.props.children; }
}

  console.log("SNOW-BUILD-v3");
  var ns = window.TNDesignSystem_7f9df2;
  if (!ns || !ns.Button || !ns.Icon || !window.AppHeader || !window.ProjectsView) { return setTimeout(boot, 30); }

  window.__snowRoot.render(<Boundary><App /></Boundary>);
})();

  function scan(root){ try{ (root.querySelectorAll ? root.querySelectorAll("span[aria-hidden]") : []).forEach(fix); }catch(e){} }
  function start(){ scan(document); var obs = new MutationObserver(function(muts){ muts.forEach(function(mu){ if(mu.type === "attributes"){ fix(mu.target); } if(mu.addedNodes){ mu.addedNodes.forEach(function(n){ if(n.nodeType === 1){ fix(n); scan(n); } }); } }); }); obs.observe(document.body, {childList:true, subtree:true, attributes:true, attributeFilter:["style"]}); [120,400,900,1800,3000].forEach(function(t){ setTimeout(function(){ scan(document); }, t); }); }
