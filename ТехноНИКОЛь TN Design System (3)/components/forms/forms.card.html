<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-family-base); background: #fff; }
  .wrap { padding: 22px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root" class="wrap"></div>
  <script type="text/babel">
    const { Input, Select, Search, Checkbox, Radio, Switch } = window.TNDesignSystem_7f9df2;
    function Demo() {
      return (
        <>
          <div className="stack">
            <Input label="Название документа" defaultValue="Кровля-2024.docx" icon="file-text" />
            <Select label="Тип норматива" options={[{id:"gost",title:"ГОСТ"},{id:"sp",title:"СП — свод правил"},{id:"tu",title:"ТУ"}]} value="sp" />
            <Search placeholder="Поиск по базе знаний" defaultValue="теплоизоляция" />
          </div>
          <div className="stack">
            <Input label="Email" defaultValue="ivan" error="Неверный формат адреса" />
            <Checkbox label="Учитывать отменённые редакции" defaultChecked />
            <Radio name="s" label="Проверить весь документ" defaultChecked />
            <Switch label="Только критичные замечания" defaultChecked />
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
