<!-- @dsCard group="Spacing" viewport="700x150" name="Elevation" subtitle="Two shadows — small (menus/cards) and large (modals)" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-family-base); background: var(--neutral-10); }
  .wrap { padding: 24px 28px; display: flex; gap: 28px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .col i { width: 150px; height: 70px; background: #fff; border-radius: var(--radius-lg); }
  .col span { font-size: 12px; color: var(--neutral-60); font-family: var(--font-family-mono); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col"><i style="box-shadow:var(--shadow-small)"></i><span>--shadow-small</span></div>
    <div class="col"><i style="box-shadow:var(--shadow-large)"></i><span>--shadow-large</span></div>
  </div>
</body>
</html>
