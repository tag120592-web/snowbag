<!-- @dsCard group="Type" viewport="700x150" name="Weights" subtitle="Light 300 · Regular 400 · Medium 500 · Semibold 600 · Bold 700 · Extrabold 800" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-family-base); background: #fff; color: var(--neutral-100); }
  .wrap { padding: 22px 24px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px 24px; }
  .cell .w { font-size: 26px; margin-bottom: 2px; }
  .cell .l { font-size: 11px; color: var(--neutral-50); font-family: var(--font-family-mono); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="cell"><div class="w" style="font-weight:300">Аа Бб Вв</div><div class="l">300 · Light</div></div>
    <div class="cell"><div class="w" style="font-weight:400">Аа Бб Вв</div><div class="l">400 · Regular</div></div>
    <div class="cell"><div class="w" style="font-weight:500">Аа Бб Вв</div><div class="l">500 · Medium</div></div>
    <div class="cell"><div class="w" style="font-weight:600">Аа Бб Вв</div><div class="l">600 · Semibold</div></div>
    <div class="cell"><div class="w" style="font-weight:700">Аа Бб Вв</div><div class="l">700 · Bold</div></div>
    <div class="cell"><div class="w" style="font-weight:800">Аа Бб Вв</div><div class="l">800 · Extrabold</div></div>
  </div>
</body>
</html>
