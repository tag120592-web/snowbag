<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="4 → 20px and pill — controls 8, cards 12, sheets 16" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-family-base); background: #fff; }
  .wrap { padding: 20px 24px; display: flex; gap: 18px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .col i { width: 64px; height: 64px; background: var(--neutral-15); border: 1.5px solid var(--neutral-30); }
  .col span { font-size: 11px; color: var(--neutral-55); font-family: var(--font-family-mono); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col"><i style="border-radius:var(--radius-xs)"></i><span>xs · 4</span></div>
    <div class="col"><i style="border-radius:var(--radius-sm)"></i><span>sm · 6</span></div>
    <div class="col"><i style="border-radius:var(--radius-md)"></i><span>md · 8</span></div>
    <div class="col"><i style="border-radius:var(--radius-lg)"></i><span>lg · 12</span></div>
    <div class="col"><i style="border-radius:var(--radius-xl)"></i><span>xl · 16</span></div>
    <div class="col"><i style="border-radius:var(--radius-2xl)"></i><span>2xl · 20</span></div>
    <div class="col"><i style="border-radius:var(--radius-pill)"></i><span>pill</span></div>
  </div>
</body>
</html>
